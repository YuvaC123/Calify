<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Calify</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>

<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
:root{--ct1:#f1f5f9;--ct2:#94a3b8;--ct3:#64748b;--ct4:#475569;--ct5:#334155;--ct6:#1e293b;--cbg:#060b15;--cbg2:#0c1624;--ccard:#0e1623;--cov1:rgba(255,255,255,.025);--cov2:rgba(255,255,255,.04);--cborder:rgba(255,255,255,.06);--cborder2:rgba(255,255,255,.1)}
body.light{--ct1:#0f172a;--ct2:#475569;--ct3:#64748b;--ct4:#64748b;--ct5:#94a3b8;--ct6:#94a3b8;--cbg:#f1f5f9;--cbg2:#ffffff;--ccard:#ffffff;--cov1:rgba(0,0,0,.03);--cov2:rgba(0,0,0,.05);--cborder:rgba(0,0,0,.08);--cborder2:rgba(0,0,0,.13)}
body{background:var(--cbg);color:var(--ct1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-size:15px;line-height:1.6}

/* ── Animations ── */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes right{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes xleft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes sheet{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes over{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-4px)}70%{transform:translateX(4px)}}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes pulse-glow{0%,100%{opacity:.4}50%{opacity:1}}

.au{animation:up .24s cubic-bezier(.22,1,.36,1) both}
.ar{animation:right .24s cubic-bezier(.22,1,.36,1) both}
.al{animation:xleft .24s cubic-bezier(.22,1,.36,1) both}
.d1{animation-delay:.03s}.d2{animation-delay:.06s}.d3{animation-delay:.09s}
.d4{animation-delay:.12s}.d5{animation-delay:.15s}.d6{animation-delay:.19s}
.shake{animation:shake .3s ease}.pop{animation:pop .24s cubic-bezier(.34,1.56,.64,1) both}

/* ── Surfaces — flat, minimal borders ── */
.card{background:var(--ccard);border:1px solid var(--cborder);border-radius:14px}
.card-accent{background:var(--ccard);border:1px solid rgba(45,212,191,.15);border-radius:14px}
.surface{background:var(--cov1);border-radius:10px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;font-weight:700;border-radius:10px;transition:all .15s;cursor:pointer;border:none;font-family:inherit;letter-spacing:-.01em;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:#0d9488;color:#fff;padding:14px 22px;font-size:15px}
.btn-primary:hover{background:#0f766e;transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,148,136,.35)}
.btn-secondary{background:transparent;color:#2dd4bf;border:1px solid rgba(45,212,191,.25);padding:12px 20px;font-size:14px}
.btn-secondary:hover{background:rgba(45,212,191,.07);border-color:rgba(45,212,191,.45)}
.btn-ghost{background:transparent;color:#334155;padding:10px 16px;font-size:14px;font-weight:600}
.btn-ghost:hover{color:#64748b}
.btn-sm{padding:8px 13px;font-size:12px;border-radius:8px}

/* ── Choices ── */
.choice{width:100%;text-align:left;background:var(--cov1);border:1px solid var(--cborder);border-radius:10px;padding:13px 15px;font-size:14px;font-weight:500;color:var(--ct2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .14s;font-family:inherit}
.choice:hover{border-color:rgba(45,212,191,.35);background:rgba(45,212,191,.05);color:var(--ct1)}
.choice.sel{border-color:#2dd4bf;background:rgba(45,212,191,.08);color:var(--ct1);font-weight:600}

/* ── Inputs ── */
input[type=text],input[type=email],input[type=password]{
  font-family:inherit;font-size:14px;border:1px solid var(--cborder2);
  border-radius:9px;padding:12px 14px;width:100%;outline:none;
  transition:border-color .15s,box-shadow .15s;background:var(--cov1);color:var(--ct1)}
input::placeholder{color:var(--ct5)}
input:focus{border-color:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,.08)}

/* ── Progress ── */
.prog-bar{height:2px;background:var(--cborder);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#2dd4bf;border-radius:2px;transition:width .45s cubic-bezier(.22,1,.36,1)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:over .18s ease both}
.modal{width:100%;max-width:480px;max-height:92vh;overflow-y:auto;background:var(--ccard);border:1px solid var(--cborder2);border-radius:20px 20px 0 0;animation:sheet .28s cubic-bezier(.22,1,.36,1) both}

/* ── Action links ── */
.alink{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;border-radius:8px;padding:6px 10px;text-decoration:none;transition:all .13s;white-space:nowrap}
.alink-teal{color:#2dd4bf;background:rgba(45,212,191,.08)}
.alink-teal:hover{background:rgba(45,212,191,.14)}
.alink-blue{color:#38bdf8;background:rgba(56,189,248,.08)}
.alink-blue:hover{background:rgba(56,189,248,.14)}
.alink-purple{color:#a78bfa;background:rgba(167,139,250,.08)}
.alink-purple:hover{background:rgba(167,139,250,.14)}
.alink-orange{color:#fb923c;background:rgba(251,146,60,.08)}
.alink-orange:hover{background:rgba(251,146,60,.14)}

/* ── Dropdown ── */
.dd-menu{position:absolute;right:0;top:calc(100%+6px);background:var(--ccard);border:1px solid var(--cborder2);border-radius:10px;overflow:hidden;z-index:100;min-width:150px;box-shadow:0 16px 48px rgba(0,0,0,.3);animation:up .16s cubic-bezier(.22,1,.36,1) both}
.dd-item{width:100%;display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:background .1s;border:none;background:none;font-family:inherit;color:var(--ct2);text-align:left}
.dd-item:hover{background:var(--cov2)}
.dd-item.active{color:#2dd4bf;background:rgba(45,212,191,.07)}

/* ── Sidebar layout ── */
.app-shell{display:flex;flex-direction:column;min-height:100vh}
.app-body{display:flex;flex:1}
.sidebar{display:none;width:260px;flex-shrink:0;border-right:1px solid var(--cborder);padding:24px 16px;flex-direction:column;gap:4px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;background:var(--cbg)}
.main-col{flex:1;min-width:0;padding:28px 28px;max-width:780px}

@media(min-width:900px){
  .sidebar{display:flex}
  .main-col{padding:36px 44px}
}
@media(min-width:1200px){
  .main-col{max-width:860px}
  .sidebar{width:280px}
}

/* ── Results grid ── */
.results-grid{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:1050px){
  .results-grid{grid-template-columns:1fr 300px}
}

/* ── Sidebar nav items ── */
.snav{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:all .13s;font-size:13px;font-weight:600;color:var(--ct3);border:none;background:none;font-family:inherit;width:100%;text-align:left}
.snav:hover{background:var(--cov2);color:var(--ct2)}
.snav.active{background:rgba(45,212,191,.09);color:#2dd4bf}
.snav-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ── Gradient text ── */
.grad{background:linear-gradient(135deg,#2dd4bf,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── Mobile bottom bar ── */
.mobile-bar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:90;padding:8px 8px calc(8px + env(safe-area-inset-bottom));gap:4px;border-top:1px solid var(--cborder);background:var(--cbg);backdrop-filter:blur(16px)}
@media(min-width:900px){.mobile-bar{display:none}}
.mobile-bar-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:none;cursor:pointer;font-family:inherit;border-radius:9px;transition:background .13s}
.mobile-bar-btn:hover,.mobile-bar-btn.active{background:rgba(45,212,191,.08)}
.mobile-bar-btn span:first-child{font-size:18px}
.mobile-bar-btn span:last-child{font-size:10px;font-weight:700;color:#1e293b;letter-spacing:.02em}
.mobile-bar-btn.active span:last-child{color:#2dd4bf}

/* ── Mobile padding for bottom bar ── */
.has-mobile-bar{padding-bottom:80px}
@media(min-width:900px){.has-mobile-bar{padding-bottom:0}}

/* ── Light mode tweaks (variables handle most of it) ── */
body.light .btn-secondary{color:#0d9488;border-color:rgba(13,148,136,.3)}
body.light .btn-ghost{color:var(--ct3)}
body.light .alink-teal{color:#0d9488}
body.light .alink-blue{color:#0369a1;background:rgba(3,105,161,.08)}
body.light .alink-purple{color:#7c3aed;background:rgba(124,58,237,.08)}
body.light .alink-orange{color:#c2410c;background:rgba(194,65,12,.08)}
body.light .snav.active{background:rgba(13,148,136,.1);color:#0d9488}
body.light .mobile-bar-btn span:last-child{color:var(--ct3)}

/* ── Print ── */
@media print{
  .no-print{display:none!important}.printable{display:block!important}
  body{background:#fff;color:#000;font-size:11pt}
  .card,.card-accent,.surface{box-shadow:none!important;border:1px solid #ddd!important;background:#fff!important}
  .sidebar,.mobile-bar{display:none!important}
  .main-col{padding:0!important;max-width:100%!important}
}
.printable{display:none}
</style>

function hash(s){let h=5381;for(let i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h=h&h;}return h.toString(36);}
const LS={
  users:()=>{try{return JSON.parse(localStorage.getItem("cnav_u")||"[]")}catch{return[]}},
  setUsers:u=>localStorage.setItem("cnav_u",JSON.stringify(u)),
  me:()=>{try{return JSON.parse(localStorage.getItem("cnav_me")||"null")}catch{return null}},
  setMe:u=>localStorage.setItem("cnav_me",JSON.stringify(u)),
  clearMe:()=>localStorage.removeItem("cnav_me"),
  sessions:uid=>{try{const a=JSON.parse(localStorage.getItem("cnav_s")||"{}");return a[uid]||[]}catch{return[]}},
  addSession:(uid,n)=>{try{const a=JSON.parse(localStorage.getItem("cnav_s")||"{}");const t=new Date().toISOString().slice(0,10);const s=a[uid]||[];const i=s.findIndex(x=>x.date===t);if(i>=0)s[i].count+=n;else s.unshift({date:t,count:n,id:Date.now()});a[uid]=s.slice(0,30);localStorage.setItem("cnav_s",JSON.stringify(a));}catch{}},
  todayCount:uid=>{const t=new Date().toISOString().slice(0,10);return(LS.sessions(uid).find(s=>s.date===t)||{count:0}).count;},
  totalCount:uid=>LS.sessions(uid).reduce((a,s)=>a+s.count,0),
};
function doSignup({name,email,password}){
  const users=LS.users();
  if(users.find(u=>u.email.toLowerCase()===email.toLowerCase()))return{err:"Email already registered."};
  const u={id:Date.now().toString(36),name,email:email.toLowerCase(),ph:hash(password)};
  LS.setUsers([...users,u]);const me={id:u.id,name:u.name,email:u.email};LS.setMe(me);return{user:me};
}
function doLogin({email,password}){
  const u=LS.users().find(u=>u.email.toLowerCase()===email.toLowerCase());
  if(!u)return{err:"No account with that email."};
  if(u.ph!==hash(password))return{err:"Incorrect password."};
  const me={id:u.id,name:u.name,email:u.email};LS.setMe(me);return{user:me};
}

function Dropdown({trigger,children}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  return(
    <div className="relative" ref={ref} style={{display:"inline-block"}}>
      <div onClick={()=>setOpen(o=>!o)}>{trigger(open)}</div>
      {open&&<div className="dd-menu" onClick={()=>setOpen(false)}>{children}</div>}
    </div>
  );
}

// ── LANG DROPDOWN ─────────────────────────────────────────────

        <span style={{fontSize:14}}>{cur.flag}</span><span>{cur.label}</span><span style={{fontSize:10,opacity:.7}}>{open?"▴":"▾"}</span>
      </button>
    )}>
      {LANGS.map(l=>(
        <button key={l.code} onClick={()=>setLang(l.code)} className={`dd-item${l.code===lang?" active":""}`}>

          {l.code===lang&&<span style={{marginLeft:"auto",color:"#2dd4bf",fontSize:11}}>✓</span>}

}

// ── APPLY ACTIONS ─────────────────────────────────────────────
function ApplyActions({lang,prog,ans}){
  const a=prog.apply;if(!a)return null;
  const cd=ans?.zip?getCountyLinks(ans.zip):null;
  const cr=cd&&a.countyKey?cd.links[a.countyKey]:null;
  return(
    <div>
      <p className="text-xs font-black uppercase tracking-widest mb-2" style={{color:"var(--ct5)"}}>{t(lang,"next")}</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {a.online&&<a href={a.online.url} target="_blank" rel="noopener noreferrer" className="alink alink-teal">{a.online[lang]||a.online.en}</a>}
        {a.altOnline&&<a href={a.altOnline.url} target="_blank" rel="noopener noreferrer" className="alink alink-teal">{a.altOnline[lang]||a.altOnline.en}</a>}
        {a.extra&&(()=>{const ex=(a.extra[lang]||a.extra.en)(ans);return ex?<a key="v" href={ex.url} target="_blank" rel="noopener noreferrer" className="alink alink-orange">{ex.label}</a>:null;})()}
        {a.phone&&<a href={`tel:${a.phone.number.replace(/[^\d]/g,"")}`} className="alink alink-blue">{a.phone.label[lang]}: {a.phone.number}</a>}
        {cr?.phone&&cr.phone!==a.phone?.number&&<a href={`tel:${cr.phone.replace(/[^\d]/g,"")}`} className="alink alink-blue">{cd.county}: {cr.phone}</a>}
        {cr?.url&&cr.url!==a.online?.url&&<a href={cr.url} target="_blank" rel="noopener noreferrer" className="alink alink-purple">{t(lang,"county_r",{county:cd.county})}</a>}
        {cr?.office&&<a href={`https://maps.google.com/?q=${encodeURIComponent(cr.office)}`} target="_blank" rel="noopener noreferrer" className="alink alink-purple">{cr.office}</a>}
      </div>
    </div>
  );
}

// ── AUTH MODAL ────────────────────────────────────────────────
function AuthModal({lang,tab:initTab,onAuth,onClose}){
  const[tab,setTab]=useState(initTab);
  const[f,setF]=useState({name:"",email:"",pw:"",conf:""});
  const[err,setErr]=useState("");
  const[shk,setShk]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const score=pwScore(f.pw);
  const bad=msg=>{setErr(msg);setShk(true);setTimeout(()=>setShk(false),400);};
  const submit=e=>{
    e.preventDefault();setErr("");
    if(tab==="signup"){
      if(!f.name.trim())return bad("Please enter your name.");
      if(f.pw.length<8)return bad(t(lang,"pw_short"));
      if(f.pw!==f.conf)return bad(t(lang,"pw_mismatch"));
      const r=doSignup({name:f.name.trim(),email:f.email.trim(),password:f.pw});
      if(r.err)return bad(r.err);onAuth(r.user);
    }else{
      const r=doLogin({email:f.email.trim(),password:f.pw});
      if(r.err)return bad(r.err);onAuth(r.user);
    }
  };
  const IL={fontSize:11,fontWeight:800,letterSpacing:".06em",textTransform:"uppercase",color:"var(--ct5)",display:"block",marginBottom:6};
  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 8px"}}><div style={{width:36,height:4,background:"var(--cborder2)",borderRadius:2}}/></div>
        <div style={{display:"flex",borderBottom:"1px solid var(--cborder)"}}>
          {["login","signup"].map(k=>(
            <button key={k} onClick={()=>{setTab(k);setErr("");}} style={{flex:1,padding:"14px",fontSize:13,fontWeight:700,background:"none",border:"none",borderBottom:`2px solid ${tab===k?"#2dd4bf":"transparent"}`,color:tab===k?"#2dd4bf":"var(--ct4)",cursor:"pointer",fontFamily:"inherit"}}>{t(lang,k)}</button>
          ))}
        </div>
        <div style={{padding:"20px 22px"}}>
          <p style={{fontSize:13,color:"var(--ct4)",marginBottom:16}}>{t(lang,`${tab}_sub`)}</p>
          <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:12}}>
            {tab==="signup"&&<div className="au"><label style={IL}>{t(lang,"name_l")}</label><input type="text" value={f.name} onChange={e=>set("name",e.target.value)} placeholder="Your name" required autoComplete="name"/></div>}
            <div><label style={IL}>{t(lang,"email_l")}</label><input type="email" value={f.email} onChange={e=>set("email",e.target.value)} placeholder="you@email.com" required autoComplete="email"/></div>
            <div>
              <label style={IL}>{t(lang,"pw_l")}</label>
              <input type="password" value={f.pw} onChange={e=>set("pw",e.target.value)} placeholder="••••••••" required autoComplete={tab==="login"?"current-password":"new-password"}/>
              {tab==="signup"&&f.pw&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}><div style={{display:"flex",gap:3,flex:1}}>{[0,1,2,3].map(i=><div key={i} style={{height:3,flex:1,borderRadius:2,background:i<score?SC[Math.max(0,score-1)]:"var(--cborder2)",transition:"background .3s"}}/>)}</div><span style={{fontSize:11,color:"var(--ct4)"}}>{SL[lang]?.[score]}</span></div>}
            </div>
            {tab==="signup"&&<div className="au"><label style={IL}>{t(lang,"conf_l")}</label><input type="password" value={f.conf} onChange={e=>set("conf",e.target.value)} placeholder="••••••••" required autoComplete="new-password" style={{borderColor:f.conf&&f.conf!==f.pw?"rgba(239,68,68,.5)":""}}/></div>}
            {err&&<div className={shk?"shake":""} style={{fontSize:13,color:"#fca5a5",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",borderRadius:9,padding:"10px 13px"}}>{err}</div>}
            <button type="submit" className="btn btn-primary" style={{width:"100%",marginTop:4}}>{t(lang,`${tab}_btn`)}</button>
          </form>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,marginTop:16}}>
            <button onClick={()=>{setTab(tab==="login"?"signup":"login");setErr("");}} style={{fontSize:13,fontWeight:700,color:"#2dd4bf",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>{t(lang,tab==="login"?"to_signup":"to_login")}</button>
            <div style={{display:"flex",alignItems:"center",gap:12,width:"100%"}}><div style={{flex:1,height:1,background:"var(--cborder)"}}/><span style={{fontSize:11,color:"var(--ct6)"}}>{t(lang,"or")}</span><div style={{flex:1,height:1,background:"var(--cborder)"}}/></div>
            <button onClick={onClose} style={{fontSize:13,color:"var(--ct5)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>{t(lang,"guest")}</button>
          </div>
          <p style={{fontSize:11,color:"var(--ct6)",textAlign:"center",marginTop:14,lineHeight:1.6}}>{t(lang,"auth_priv")}</p>
          <p style={{fontSize:11,color:"#78350f",textAlign:"center",marginTop:4}}>{t(lang,"auth_demo")}</p>
        </div>
      </div>
    </div>
  );
}

// ── QUESTIONNAIRE ─────────────────────────────────────────────
const STEPS=["size","income","kids","preg","senior","dis","house","tax","zip"];
const N=STEPS.length;

function Questionnaire({lang,onDone}){
  const[step,setStep]=useState(0);
  const[dir,setDir]=useState("r");
  const[k,setK]=useState(0);
  const[a,setA]=useState({size:null,incomeIdx:null,hasKids:null,kidsCount:null,pregnant:null,senior:null,dis:null,house:null,taxes:null,zip:""});
  const set=(key,v)=>setA(p=>({...p,[key]:v}));
  const fwd=()=>{setDir("r");setK(n=>n+1);setStep(s=>s+1);};
  const bwd=()=>{setDir("l");setK(n=>n+1);setStep(s=>s-1);};
  const go=(key,v)=>{set(key,v);setTimeout(fwd,180);};
  const final=()=>({...a,size:(a.size??0)+1});
  const s=STEPS[step];
  const cls=dir==="r"?"ar":"al";
  const sz=t(lang,"sizes"),inc=t(lang,"incomes"),cnt=t(lang,"counts");
  const pct=Math.round((step+1)/N*100);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:24,maxWidth:560,margin:"0 auto"}}>
      {/* Progress */}
      <div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
          {step>0&&<button onClick={bwd} style={{width:36,height:36,borderRadius:"50%",border:"1px solid rgba(255,255,255,.1)",background:"var(--cov2)",color:"var(--ct3)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>‹</button>}
          <div style={{flex:1}}>
            <div className="prog-bar"><div className="prog-fill" style={{width:`${pct}%`}}/></div>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:"var(--ct5)",flexShrink:0}}>{step+1}/{N}</span>
        </div>
        {/* Step dots */}
        <div style={{display:"flex",gap:4,paddingLeft:step>0?48:0}}>
          {STEPS.map((_,i)=><div key={i} style={{height:2,flex:1,borderRadius:1,background:i<=step?"linear-gradient(90deg,#2dd4bf,#38bdf8)":"var(--cborder)",transition:"background .3s"}}/>)}
        </div>
      </div>
      <div key={k} className={cls}>
        {s==="size"&&<QStep q={t(lang,"q_size")} h={t(lang,"q_size_h")}><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>{t(lang,"sizes").map((l,i)=><Cho key={i} label={l} sel={a.size===i} onClick={()=>{set("size",i);setTimeout(fwd,180);}} delay={i}/>)}</div></QStep>}
        {s==="income"&&<QStep q={t(lang,"q_income")} h={t(lang,"q_income_h")}><div style={{display:"flex",flexDirection:"column",gap:6}}>{inc.map((l,i)=><Cho key={i} label={l} sel={a.incomeIdx===i} delay={i} onClick={()=>go("incomeIdx",i)}/>)}</div></QStep>}
        {s==="kids"&&<QStep q={t(lang,"q_kids")}><div style={{display:"flex",flexDirection:"column",gap:10}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Cho label={t(lang,"yes")} sel={a.hasKids===true} onClick={()=>set("hasKids",true)}/><Cho label={t(lang,"no")} sel={a.hasKids===false} onClick={()=>go("hasKids",false)}/></div>{a.hasKids&&<div className="au"><p style={{fontSize:12,fontWeight:800,textTransform:"uppercase",letterSpacing:".06em",color:"var(--ct5)",marginBottom:6}}>{t(lang,"q_kids_n")}</p><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>{cnt.map((l,i)=><Cho key={i} label={l} sel={a.kidsCount===i} onClick={()=>{set("kidsCount",i);setTimeout(fwd,180);}} delay={i}/>)}</div></div>}</div></QStep>}
        {s==="preg"&&<QStep q={t(lang,"q_preg")}><YNGrid yes={a.pregnant===true} onY={()=>go("pregnant",true)} onN={()=>go("pregnant",false)} lang={lang}/></QStep>}
        {s==="senior"&&<QStep q={t(lang,"q_senior")}><YNGrid yes={a.senior===true} onY={()=>go("senior",true)} onN={()=>go("senior",false)} lang={lang}/></QStep>}
        {s==="dis"&&<QStep q={t(lang,"q_dis")}><YNGrid yes={a.dis===true} onY={()=>go("dis",true)} onN={()=>go("dis",false)} lang={lang}/></QStep>}
        {s==="house"&&<QStep q={t(lang,"q_house")}><div style={{display:"flex",flexDirection:"column",gap:6}}>{[t(lang,"rent"),t(lang,"own"),t(lang,"unstable")].map((l,i)=><Cho key={i} label={l} sel={a.house===i} delay={i} onClick={()=>go("house",i)}/>)}</div></QStep>}
        {s==="tax"&&<QStep q={t(lang,"q_tax")} h={t(lang,"q_tax_h")}><div style={{display:"flex",flexDirection:"column",gap:6}}>{[t(lang,"tax_y"),t(lang,"tax_n"),t(lang,"tax_u")].map((l,i)=><Cho key={i} label={l} sel={(a.taxes===true?0:a.taxes===false?1:a.taxes==="u"?2:null)===i} delay={i} onClick={()=>{set("taxes",[true,false,"u"][i]);setTimeout(fwd,180);}}/>)}</div></QStep>}
        {s==="zip"&&<QStep q={t(lang,"q_zip")} h={t(lang,"q_zip_h")}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {a.zip&&getCounty(a.zip)&&<div className="au" style={{background:"rgba(45,212,191,.1)",border:"1px solid rgba(45,212,191,.2)",borderRadius:9,padding:"9px 13px",fontSize:13,fontWeight:700,color:"#2dd4bf"}}>{getCounty(a.zip)} County</div>}
            <input type="text" inputMode="numeric" maxLength={5} value={a.zip} onChange={e=>set("zip",e.target.value.replace(/\D/g,""))} placeholder="e.g. 94103"/>
            <button onClick={()=>onDone(final())} className="btn btn-primary" style={{width:"100%"}}>{t(lang,"results_btn")}</button>
            <button onClick={()=>{set("zip","");onDone(final());}} className="btn btn-ghost" style={{width:"100%"}}>{t(lang,"skip")} →</button>
          </div>
        </QStep>}
      </div>
    </div>
  );
}
function QStep({q,h,children}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div><h2 style={{fontSize:22,fontWeight:900,color:"var(--ct1)",margin:0,lineHeight:1.3}}>{q}</h2>{h&&<p style={{fontSize:13,color:"var(--ct4)",margin:"6px 0 0",lineHeight:1.5}}>{h}</p>}</div>
      {children}
    </div>
  );
}
function Cho({label,sel,onClick,delay=0}){
  return(
    <button onClick={onClick} className={`choice${sel?" sel":""}`} style={{animationDelay:`${delay*45}ms`}} role="radio" aria-pressed={sel}>
      <span>{label}</span>
      {sel&&<span className="pop" style={{fontSize:13,color:"#2dd4bf"}}>✓</span>}
    </button>
  );
}
function YNGrid({yes,onY,onN,lang}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Cho label={t(lang,"yes")} sel={yes===true} onClick={onY}/>
      <Cho label={t(lang,"no")} sel={yes===false} onClick={onN}/>
    </div>
  );
}

  const estTotal=progs.reduce((acc,p)=>{const s=(p.est?.[lang]||p.est?.en)?.(ans)||"";const mm=s.match(/\$([\d,]+)/);return mm?acc+parseInt(mm[1].replace(",","")):acc;},0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20,paddingBottom:80}}>
      <div className="printable"><h1 style={{fontSize:"16pt",fontWeight:900}}>{lang==="en"?"Your Benefits Summary":"Tu Resumen de Beneficios"}</h1><hr style={{margin:"8px 0"}}/></div>

        {/* LEFT: programs */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>

            {cd&&<div style={{marginBottom:14,fontSize:12,fontWeight:700,color:"#2dd4bf",display:"flex",alignItems:"center",gap:6}}>{cd.county} County — {lang==="en"?"local resources shown below":"recursos locales abajo"}</div>}
            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:16}}>
              <div>
                <div style={{fontSize:52,fontWeight:900,color:"#fff",lineHeight:1}}>{progs.length}</div>
                <div style={{fontSize:13,color:"var(--ct3)",marginTop:3}}>{lang==="en"?`program${progs.length!==1?"s":""} likely match`:`programa${progs.length!==1?"s":""} probablemente`}</div>
              </div>
              {estTotal>100&&<div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:"var(--ct5)",marginBottom:3}}>{lang==="en"?"Potential value":"Valor potencial"}</div>

              <div><p style={{fontSize:13,fontWeight:700,color:"var(--ct1)",margin:0}}>{t(lang,"pc_title")}</p><p style={{fontSize:12,color:"var(--ct4)",margin:"5px 0 0",lineHeight:1.6}}>{t(lang,"pc_body")}</p><a href="https://www.uscis.gov/green-card/green-card-processes-and-procedures/public-charge" target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"#2dd4bf",marginTop:6,display:"inline-block"}}>{t(lang,"pc_link")}</a></div>
            </div>
          </div>
          {/* Free help */}
          <div className="card" style={{padding:"16px"}}>
            <h3 style={{fontSize:15,fontWeight:800,color:"var(--ct1)",margin:"0 0 4px"}}>{t(lang,"hoff_title")}</h3>
            <p style={{fontSize:12,color:"var(--ct4)",margin:"0 0 12px"}}>{t(lang,"hoff_sub")}</p>
            {PARTNERS.map((p,i)=>(
              <div key={p.web} style={{display:"flex",gap:10,paddingBottom:i<PARTNERS.length-1?11:0,marginBottom:i<PARTNERS.length-1?11:0,borderBottom:i<PARTNERS.length-1?"1px solid rgba(255,255,255,.05)":"none"}}>

                  <p style={{fontSize:12,fontWeight:700,color:"var(--ct1)",margin:0}}>{p.name[lang]||p.name.en}</p>
                  <p style={{fontSize:11,color:"var(--ct4)",margin:"2px 0 5px",lineHeight:1.5}}>{p.desc[lang]||p.desc.en}</p>

                    <a href={p.web} target="_blank" rel="noopener noreferrer" className="alink alink-teal" style={{fontSize:11,padding:"5px 9px"}}>{t(lang,"web")} →</a>
                  </div>
                </div>
              </div>
            ))}
            <p style={{fontSize:11,color:"var(--ct6)",textAlign:"center",marginTop:12}}>{t(lang,"dial")}</p>

          {/* Actions */}
          <div className="no-print" style={{display:"flex",flexDirection:"column",gap:8}}>

        </div>
      </div>
      <div className="printable" style={{borderTop:"1px solid #ddd",paddingTop:10,marginTop:8}}><p style={{fontSize:"8pt",color:"#888"}}>{lang==="en"?"Using these programs does not affect immigration status. Final eligibility determined by official application.":"Usar estos programas no afecta el estatus migratorio."}</p></div>
    </div>
  );
}

// ── NAVIGATOR DASHBOARD ───────────────────────────────────────
function NavDash({lang,user,onNew,onShare,onShowAuth}){
  const[sessTd,setSessTd]=useState(0);
  const[sessTot,setSessTot]=useState(0);
  const today=user?LS.todayCount(user.id):sessTd;
  const total=user?LS.totalCount(user.id):sessTot;
  const sessions=user?LS.sessions(user.id).slice(0,7):[];
  const fmt=iso=>new Date(iso).toLocaleDateString(lang==="es"?"es-US":"en-US",{month:"short",day:"numeric"});
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16,paddingBottom:80,maxWidth:760,margin:"0 auto"}}>
      <div><h1 style={{fontSize:26,fontWeight:900,color:"var(--ct1)",margin:0}}>{t(lang,"nav_title")}</h1><p style={{fontSize:14,color:"var(--ct4)",margin:"4px 0 0"}}>{t(lang,"nav_sub")}</p></div>
      <div style={{background:"rgba(56,189,248,.07)",border:"1px solid rgba(56,189,248,.18)",borderRadius:12,padding:"16px 18px",display:"flex",gap:14,alignItems:"flex-start"}}>
        <svg style={{flexShrink:0,marginTop:2}} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div>
          <p style={{fontSize:13,fontWeight:800,color:"var(--ct1)",margin:"0 0 4px"}}>{lang==="en"?"What is Navigator Mode?":"¿Qué es el Modo Navegador?"}</p>
          <p style={{fontSize:13,color:"var(--ct3)",margin:0,lineHeight:1.6}}>{lang==="en"?"Navigator Mode is for community workers, social workers, and volunteers who help others apply for benefits. You can screen multiple households in one session, track how many people you've helped, and share results directly with clients — without needing to log in.":"El Modo Navegador es para trabajadores comunitarios, trabajadores sociales y voluntarios que ayudan a otros a solicitar beneficios. Puedes evaluar varios hogares en una sesión, rastrear a cuántas personas has ayudado y compartir resultados directamente con los clientes, sin necesidad de iniciar sesión."}</p>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
        <HowCard lang={lang} title={t(lang,"how_n_title")} steps={[t(lang,"how_n_1"),t(lang,"how_n_2"),t(lang,"how_n_3")]} note={t(lang,"how_n_note")}/>
        <div className="card" style={{padding:"20px"}}>
          <p style={{fontSize:11,fontWeight:800,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ct5)",margin:"0 0 14px"}}>{t(lang,"nav_impact")}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div style={{background:"var(--cov2)",borderRadius:10,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:42,fontWeight:900,color:"var(--ct1)",lineHeight:1}}>{today}</div>
              <div style={{fontSize:11,color:"var(--ct4)",marginTop:4}}>{t(lang,"nav_today")}</div>
            </div>
            <div style={{background:"var(--cov2)",borderRadius:10,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:42,fontWeight:900,lineHeight:1,background:"linear-gradient(135deg,#2dd4bf,#38bdf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{total}</div>
              <div style={{fontSize:11,color:"var(--ct4)",marginTop:4}}>{t(lang,"nav_total")}</div>
            </div>
          </div>
          {user&&sessions.length>0&&sessions.map((s,i)=><div key={s.id||i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<sessions.length-1?"1px solid rgba(255,255,255,.04)":"none"}}><span style={{fontSize:12,color:"var(--ct4)"}}>{fmt(s.date)}</span><span style={{fontSize:12,fontWeight:700,color:"#2dd4bf"}}>{s.count} {t(lang,"nav_hh")}</span></div>)}
          {user&&sessions.length===0&&<p style={{fontSize:12,color:"var(--ct6)",textAlign:"center"}}>{t(lang,"nav_no_hist")}</p>}
          {!user&&<div style={{background:"rgba(45,212,191,.06)",border:"1px solid rgba(45,212,191,.15)",borderRadius:9,padding:"12px",marginTop:4}}>
            <p style={{fontSize:13,fontWeight:700,color:"var(--ct1)",margin:"0 0 3px"}}>{t(lang,"nav_guest_title")}</p>
            <p style={{fontSize:12,color:"var(--ct4)",margin:"0 0 8px",lineHeight:1.5}}>{t(lang,"nav_guest_sub")}</p>
            <button onClick={onShowAuth} style={{fontSize:12,fontWeight:700,color:"#2dd4bf",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>{t(lang,"signup")} →</button>
          </div>}
        </div>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button onClick={onNew} className="btn btn-primary" style={{flex:1,minWidth:200}}>{t(lang,"nav_new")}</button>
        <button onClick={onShare} className="btn btn-secondary" style={{flex:1,minWidth:160}}>{t(lang,"nav_share")}</button>
      </div>
    </div>
  );
}

// ── SHARE PAGE ────────────────────────────────────────────────
function SharePage({lang,onBack}){
  const[copied,setCopied]=useState(false);
  const[big,setBig]=useState(false);
  const url=typeof window!=="undefined"?window.location.href.split("?")[0]:"https://cabeneficios.org";
  const sz=big?280:160;
  const qr=`https://api.qrserver.com/v1/create-qr-code/?size=${sz}x${sz}&data=${encodeURIComponent(url)}&margin=10&color=2dd4bf&bgcolor=080d18`;
  const copy=()=>{const fb=()=>{const el=document.createElement("textarea");el.value=url;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);};(navigator.clipboard?navigator.clipboard.writeText(url).catch(fb):Promise.resolve(fb())).finally(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16,paddingBottom:80,maxWidth:600,margin:"0 auto"}}>
      <div className="printable" style={{textAlign:"center",padding:"20px 12px",color:"#000"}}><div style={{fontSize:"22pt",fontWeight:900,marginBottom:10}}>{t(lang,"sh_head")}</div><div style={{fontSize:"12pt",color:"#444",marginBottom:14}}>{t(lang,"sh_body")}</div><img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}&margin=10`} alt="QR" style={{display:"block",margin:"0 auto 12px"}} width="200" height="200"/><div style={{fontSize:"9pt",color:"#666"}}>{t(lang,"sh_places")}</div></div>
      <div className="no-print"><h1 style={{fontSize:24,fontWeight:900,color:"var(--ct1)",margin:0}}>{t(lang,"sh_title")}</h1><p style={{fontSize:13,color:"var(--ct4)",margin:"4px 0 0"}}>{t(lang,"sh_sub")}</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:14}} className="no-print">
        <div className="card au" style={{padding:"20px",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
          <p style={{fontSize:11,fontWeight:800,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ct5)",margin:0}}>{t(lang,"sh_qr")}</p>
          <div style={{borderRadius:14,overflow:"hidden",border:"1px solid rgba(45,212,191,.2)",padding:10,background:"#080d18"}}><img src={qr} alt="QR" width={sz} height={sz} style={{display:"block",borderRadius:6}}/></div>
          <button onClick={()=>setBig(b=>!b)} style={{fontSize:12,fontWeight:700,color:"#2dd4bf",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>{big?"← Smaller":"Larger QR"}</button>
          <p style={{fontSize:11,color:"var(--ct6)",wordBreak:"break-all",textAlign:"center",margin:0}}>{url}</p>
        </div>
        <div className="card au" style={{padding:"20px"}}>
          <p style={{fontSize:11,fontWeight:800,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ct5)",margin:"0 0 10px"}}>Flyer preview</p>
          <p style={{fontSize:17,fontWeight:900,color:"var(--ct1)",margin:"0 0 6px",lineHeight:1.3}}>{t(lang,"sh_head")}</p>
          <p style={{fontSize:13,color:"var(--ct3)",margin:"0 0 8px",lineHeight:1.6}}>{t(lang,"sh_body")}</p>
          <p style={{fontSize:13,fontWeight:800,background:"linear-gradient(135deg,#2dd4bf,#38bdf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"0 0 10px"}}>{t(lang,"sh_url")}</p>
          <p style={{fontSize:11,color:"var(--ct5)",margin:0,lineHeight:1.6}}>{t(lang,"sh_places")}</p>
        </div>
      </div>
      <div className="no-print" style={{display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={()=>window.print()} className="btn btn-primary" style={{width:"100%"}}>{t(lang,"print_fly")}</button>
        <button onClick={copy} className="btn btn-secondary" style={{width:"100%",...(copied?{borderColor:"#2dd4bf",color:"#2dd4bf"}:{})}}>{copied?t(lang,"copied"):t(lang,"copy")}</button>
        <button onClick={onBack} className="btn btn-ghost" style={{width:"100%"}}>{t(lang,"back_res")}</button>
      </div>
    </div>
  );
}

            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><line x1="12" y1="2" x2="12" y2="4"/></svg>,t:"Seniors 60 and older"},
            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,t:"People with disabilities"},
            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,t:"Immigrants — documented and undocumented"},
          ]:[
            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,t:"Personas que rentan o son dueñas de casa con ingresos bajos"},
            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,t:"Familias con hijos de cualquier edad"},
            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,t:"Embarazadas o nuevos padres"},
            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><line x1="12" y1="2" x2="12" y2="4"/></svg>,t:"Personas de 60 años o más"},
            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,t:"Personas con discapacidades"},
            {icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,t:"Inmigrantes — documentados e indocumentados"},
          ]).map((r,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:9,marginBottom:i<5?8:0}}>
              <span style={{flexShrink:0,display:"flex",alignItems:"center"}}>{r.icon}</span>
              <span style={{fontSize:13,color:"var(--ct4)",lineHeight:1.4}}>{r.t}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Programs grid */}
      <div>
        <div style={{marginBottom:14}}>
          <p style={{fontSize:11,fontWeight:800,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ct5)",margin:"0 0 4px"}}>{t(lang,"programs")}</p>
          <p style={{fontSize:13,color:"var(--ct5)",margin:0}}>{lang==="en"?"We instantly check your household against all 10 of these — you only see the ones you match.":"Evaluamos tu hogar contra los 10 programas al instante — solo ves los que aplican."}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
          {PROGS.map((p,i)=>{
            const cc=CAT_COLOR[p.cat]||"#2dd4bf";
            const tagline={
              calfresh:{en:"Monthly grocery money on an EBT card",es:"Dinero mensual para comida en tarjeta EBT"},
              wic:{en:"Food & nutrition for moms and kids under 5",es:"Comida y nutrición para mamás e hijos menores de 5"},
              medic:{en:"Free or nearly free doctor, dental & vision",es:"Médico, dental y visión gratis o casi gratis"},
              eitc:{en:"Up to $12,000+ back when you file taxes",es:"Hasta $12,000+ de regreso al declarar impuestos"},
              liheap:{en:"Help paying your electricity or gas bill",es:"Ayuda para pagar luz o gas"},
              care:{en:"Permanent 20–35% off your utility bill",es:"20–35% de descuento permanente en servicios"},
              lifeline:{en:"Discounted or free phone & internet",es:"Teléfono e internet con descuento o gratis"},
              calworks:{en:"Monthly cash + job training for families with kids",es:"Efectivo mensual y capacitación laboral para familias"},
              ssi:{en:"Monthly cash for seniors 65+ or people with disabilities",es:"Efectivo mensual para personas mayores o con discapacidad"},
              coveredca:{en:"Low-cost health insurance if you earn too much for Medi-Cal",es:"Seguro de salud asequible si ganas demasiado para Medi-Cal"},
            }[p.id]||{en:"",es:""};
            return(
              <ProgCard key={p.id} p={p} i={i} lang={lang} cc={cc} tagline={tagline}/>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── PROGRAM CARD (landing grid) ───────────────────────────────
function ProgCard({p,i,lang,cc,tagline}){
  const[hov,setHov]=useState(false);
  return(
    <div
      key={p.id}
      className={`au d${Math.min(i+1,6)}`}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{background:hov?`${cc}10`:"var(--cov1)",border:`1px solid ${hov?cc+"44":"var(--cborder)"}`,borderRadius:11,padding:"12px 14px",cursor:"default",transition:"background .18s,border-color .18s"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:hov?8:5}}>
        <div style={{fontSize:12,fontWeight:800,color:hov?cc:"var(--ct1)",transition:"color .18s"}}>{p.name[lang]||p.name.en}</div>
        <div style={{fontSize:9,fontWeight:800,letterSpacing:".06em",textTransform:"uppercase",color:cc,opacity:.8,flexShrink:0}}>{p.cat}</div>
      </div>
      <div style={{fontSize:12,color:"var(--ct5)",lineHeight:1.5}}>{tagline[lang]||tagline.en}</div>
      {hov&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${cc}22`,fontSize:12,color:"var(--ct3)",lineHeight:1.6}}>{p.desc[lang]||p.desc.en}</div>}
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────
function Sidebar({lang,view,mode,onHome,onNav,onShare}){
  return(
    <aside className="sidebar no-print">
      {/* Navigation only — logo, lang, login are in the header */}
      <button onClick={onHome} className={`snav${(view==="landing"||view==="quest"||view==="results")&&mode==="hh"?" active":""}`}>
        <div className="snav-icon" style={{background:"rgba(52,211,153,.12)"}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34d399" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <span>{t(lang,"sidebar_household")}</span>
      </button>
      <button onClick={onNav} className={`snav${mode==="nav"?" active":""}`}>
        <div className="snav-icon" style={{background:"rgba(56,189,248,.12)"}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        </div>
        <span>{t(lang,"sidebar_navigator")}</span>
      </button>
      <button onClick={onShare} className={`snav${view==="share"?" active":""}`}>
        <div className="snav-icon" style={{background:"rgba(167,139,250,.12)"}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </div>
        <span>{t(lang,"sidebar_share")}</span>
      </button>
    </aside>
  );
}

// ── HEADER ────────────────────────────────────────────────────
function Header({lang,setLang,user,dark,setDark,onHome,onLogin,onLogout}){
  return(
    <header className="no-print" style={{position:"sticky",top:0,zIndex:90,background:dark?"rgba(6,11,21,.96)":"rgba(248,250,252,.96)",backdropFilter:"blur(20px)",borderBottom:dark?"1px solid rgba(255,255,255,.04)":"1px solid rgba(0,0,0,.08)",padding:"11px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
      <button onClick={onHome} style={{fontSize:17,fontWeight:900,letterSpacing:"-.03em",color:dark?"var(--ct1)":"var(--ct1)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Calify<span style={{color:"#2dd4bf"}}>.</span></button>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <LangDropdown lang={lang} setLang={setLang}/>
        <button
          onClick={()=>setDark(d=>!d)}
          title={dark?"Switch to light mode":"Switch to dark mode"}
          className="btn btn-secondary btn-sm">
          {dark?"Light":"Dark"}
        </button>
        {user?<UserMenu lang={lang} user={user} onLogout={onLogout}/>:<button onClick={onLogin} className="btn btn-secondary btn-sm">{t(lang,"login")}</button>}
      </div>
    </header>
  );
}

// ── MOBILE BOTTOM BAR ─────────────────────────────────────────
function MobileBar({lang,view,mode,onHome,onNav,onShare}){
  const hh=(view==="landing"||view==="quest"||view==="results")&&mode==="hh";
  const nav=mode==="nav";
  const sh=view==="share";
  return(
    <nav className="mobile-bar">
      <button onClick={onHome} className={`mobile-bar-btn${hh?" active":""}`}>
        <span>{t(lang,"hh_mode")}</span>
      </button>
      <button onClick={()=>{}} className={`mobile-bar-btn${!hh&&!nav&&!sh?" active":""}`} style={{opacity:.4,cursor:"default"}}>
        <span>Results</span>
      </button>
      <button onClick={onNav} className={`mobile-bar-btn${nav?" active":""}`}>
        <span>{lang==="en"?"Navigate":"Navegar"}</span>
      </button>
      <button onClick={onShare} className={`mobile-bar-btn${sh?" active":""}`}>
        <span>{t(lang,"share")}</span>
      </button>
    </nav>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const[lang,setLang]=useState("en");
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem("c_dark")!=="0";}catch{return true;}});
  const[view,setView]=useState("landing");
  const[mode,setMode]=useState("hh");
  const[ans,setAns]=useState(null);
  const[progs,setProgs]=useState([]);
  const[logged,setLogged]=useState(false);
  const[user,setUser]=useState(()=>LS.me());
  const[authOpen,setAuthOpen]=useState(false);
  const[authTab,setAuthTab]=useState("login");
  useEffect(()=>{document.documentElement.lang=lang;},[lang]);
  useEffect(()=>{document.body.className=dark?"":"light";try{localStorage.setItem("c_dark",dark?"1":"0");}catch{};},[dark]);
  const onDone=useCallback(a=>{setAns(a);setProgs(screen(a));setLogged(false);setView("results");},[]);
  const logHH=useCallback(()=>{if(user)LS.addSession(user.id,1);setLogged(true);},[user]);
  const doAuth=u=>{setUser(u);setAuthOpen(false);};
  const doLogout=()=>{LS.clearMe();setUser(null);};
  const openAuth=(tab="login")=>{setAuthTab(tab);setAuthOpen(true);};
  const goNav=()=>{setMode("nav");setView("nav");};
  const goHome=()=>{setMode("hh");setView("landing");};
  return(
    <div className="app-shell">
      <Header lang={lang} setLang={setLang} user={user} dark={dark} setDark={setDark} onHome={goHome} onLogin={()=>openAuth("login")} onLogout={doLogout}/>
      <div className="app-body">
        <Sidebar lang={lang} view={view} mode={mode}
          onHome={goHome} onNav={goNav} onShare={()=>setView("share")}/>
        <main className="main-col has-mobile-bar">
          {view==="landing"&&<Landing lang={lang} onStart={()=>setView("quest")} onNav={goNav}/>}
          {view==="quest"&&<Questionnaire lang={lang} onDone={onDone}/>}
          {view==="results"&&<Results lang={lang} ans={ans} progs={progs} navMode={mode==="nav"} logged={logged} onLog={logHH} onBack={goHome} onShare={()=>setView("share")} onPrint={()=>window.print()}/>}
          {view==="share"&&<SharePage lang={lang} onBack={()=>setView(ans?"results":"landing")}/>}
          {view==="nav"&&<NavDash lang={lang} user={user} onNew={()=>setView("quest")} onShare={()=>setView("share")} onShowAuth={()=>openAuth("signup")}/>}
        </main>
      </div>
      <MobileBar lang={lang} view={view} mode={mode} onHome={goHome} onNav={goNav} onShare={()=>setView("share")}/>
      {authOpen&&<AuthModal lang={lang} tab={authTab} onAuth={doAuth} onClose={()=>setAuthOpen(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
